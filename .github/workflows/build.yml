name: Build DLL

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-2022
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg\archives

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\.vcpkg\archives
          key: vcpkg-bincache-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakePresets.json', 'triplets/*.cmake') }}
          restore-keys: |
            vcpkg-bincache-${{ runner.os }}-

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.2.3
          ninjaVersion: latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ env.VCPKG_ROOT }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Normalize vcpkg environment
        shell: pwsh
        run: |
          $cacheDir = "${{ github.workspace }}\.vcpkg\archives"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          "VCPKG_ROOT=$env:RUNVCPKG_VCPKG_ROOT" >> $env:GITHUB_ENV
          "VCPKG_BINARY_SOURCES=clear;default,readwrite" >> $env:GITHUB_ENV
          "VCPKG_DEFAULT_BINARY_CACHE=$cacheDir" >> $env:GITHUB_ENV
          "$env:RUNVCPKG_VCPKG_ROOT" >> $env:GITHUB_PATH

      - name: Verify vcpkg environment
        shell: pwsh
        run: |
          Write-Host "VCPKG_ROOT=$env:VCPKG_ROOT"
          Write-Host "RUNVCPKG_VCPKG_ROOT=$env:RUNVCPKG_VCPKG_ROOT"
          Write-Host "VCPKG_BINARY_SOURCES=$env:VCPKG_BINARY_SOURCES"
          Write-Host "VCPKG_DEFAULT_BINARY_CACHE=$env:VCPKG_DEFAULT_BINARY_CACHE"
          where.exe vcpkg
          & "$env:VCPKG_ROOT\vcpkg.exe" version

      - name: Configure
        run: cmake --preset ci-release

      - name: Build
        run: cmake --build build/ci-release --parallel

      - name: Stage artifact
        shell: pwsh
        run: |
          $artifactRoot = "${{ github.workspace }}\artifact\FGTweak\SKSE\Plugins"
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null
          Copy-Item "build/ci-release/FGTweak.dll" "$artifactRoot\FGTweak.dll"

      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $zipPath = "${{ github.workspace }}\FGTweak-${{ github.ref_name }}.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "artifact\FGTweak\*" -DestinationPath $zipPath

      - name: Upload CI artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: FGTweak
          if-no-files-found: error
          path: artifact

      - name: Upload release package
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: FGTweak-release
          if-no-files-found: error
          path: FGTweak-${{ github.ref_name }}.zip

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: FGTweak-release
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/FGTweak-${{ github.ref_name }}.zip
          generate_release_notes: true
