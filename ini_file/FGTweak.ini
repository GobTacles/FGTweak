pagefile = <<<ENDTAG
Windows PageFile
Without closing this message till the end, follow these instructions:
1. Press Windows + R and enter: 'sysdm.cpl ,3'
2. Under the Performance section, press 'Settings'
3. Go to the Advanced tab at the top, and at the Virtual memory section press 'Change...'
4. Disable 'Automatically manage paging file size for all drives'
5. Set a custom size for your fastest drive and increase the initial and maximum size to be at least 20GB (20000MB).
6. Close Skyrim and restart your computer to make sure the changes have taken effect.
ENDTAG

